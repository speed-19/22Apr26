<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GIFT</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* background-color: #3e9d9d; */
      font-family: monospace;
      position: relative;
     

    }

    .container {
      background: white;
      padding: 9rem;
      border-radius: 1rem;
      text-align: center;
      align-items: center;

      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 50px;
      font-size: 1.4rem;
      border: none;
      border-radius: 20px;
      cursor: pointer;

      
    }

    

    #no {
      background-color: green;
      color: white;
      position: absolute;
      transition: 0.2s ease;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Are you excited to open the GIFT? 😄</h1>
    <!-- <button id="yes">Yes</button> -->
    <a href="gift.html" target="_blank"><button id="no">Yes</button></a>
  </div>

  
  <script>
    const noBtn = document.getElementById("no");
  
    let moveCount = 0;
  
    function moveButton() {
  
      if (moveCount >= 3) return;
  
      const x = Math.random() * 200;
      const y = Math.random() * 120;
  
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
  
      moveCount++;
  
      if (moveCount === 2) {
        noBtn.textContent = "Try Again ! :)";
      }
  
      if (moveCount === 3) {
        noBtn.textContent = "You got me. Open the gift! 🎁";
      }
    }
  
    // desktop
    noBtn.addEventListener("mouseenter", moveButton);
  
    // mobile
    noBtn.addEventListener("touchstart", moveButton);
  </script>

</body>
</html>
